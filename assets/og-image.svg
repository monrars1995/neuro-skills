<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#18181b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a430;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8972e;stop-opacity:1" />
    </linearGradient>
    <!-- Glow effect -->
    <radialGradient id="glow1" cx="100%" cy="0%" r="40%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="0%" cy="100%" r="30%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Glow effects -->
  <ellipse cx="1100" cy="-50" rx="400" ry="400" fill="url(#glow1)"/>
  <ellipse cx="150" cy="700" rx="300" ry="300" fill="url(#glow2)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(212,175,55,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Brand Icon -->
  <rect x="500" y="100" width="56" height="56" rx="12" fill="url(#gold-gradient)" filter="url(#drop-shadow)"/>
  <text x="528" y="140" font-family="Arial Black, sans-serif" font-size="32" fill="#0a0a0f" text-anchor="middle" font-weight="800">⚡</text>
  
  <!-- Brand Name -->
  <text x="600" y="145" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="800">
    <tspan>Neuro</tspan><tspan fill="#d4af37">Skills</tspan>
  </text>
  
  <!-- Main Headline -->
  <text x="600" y="260" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="54" fill="#ffffff" text-anchor="middle" font-weight="800" letter-spacing="-1">
    <tspan x="600" dy="0">O Bastidor Técnico</tspan>
    <tspan x="600" dy="70" fill="url(#gold-gradient)">que o Mercado Não Mostra</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="400" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#a1a1aa" text-anchor="middle" font-weight="500">
    <tspan x="600" dy="0">Framework de automação de Meta Ads para</tspan>
    <tspan x="600" dy="32">Claude Code, OpenAI Codex e Gemini CLI</tspan>
  </text>
  
  <!-- Features -->
  <g transform="translate(180, 460)">
    <!-- Feature 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="240" height="40" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
      <circle cx="24" cy="20" r="10" fill="url(#gold-gradient)"/>
      <text x="20" y="24" font-family="Arial" font-size="12" fill="#0a0a0f" font-weight="700">✓</text>
      <text x="44" y="26" font-family="Inter, sans-serif" font-size="14" fill="#ffffff" font-weight="600">Skills Prontos</text>
    </g>
    
    <!-- Feature 2 -->
    <g transform="translate(260, 0)">
      <rect x="0" y="0" width="240" height="40" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
      <circle cx="24" cy="20" r="10" fill="url(#gold-gradient)"/>
      <text x="20" y="24" font-family="Arial" font-size="12" fill="#0a0a0f" font-weight="700">⚡</text>
      <text x="44" y="26" font-family="Inter, sans-serif" font-size="14" fill="#ffffff" font-weight="600">Automação Real</text>
    </g>
    
    <!-- Feature 3 -->
    <g transform="translate(520, 0)">
      <rect x="0" y="0" width="240" height="40" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
      <circle cx="24" cy="20" r="10" fill="url(#gold-gradient)"/>
      <text x="20" y="24" font-family="Arial" font-size="12" fill="#0a0a0f" font-weight="700">📊</text>
      <text x="44" y="26" font-family="Inter, sans-serif" font-size="14" fill="#ffffff" font-weight="600">ROI Comprovado</text>
    </g>
  </g>
  
  <!-- CTA Button -->
  <g transform="translate(450, 530)">
    <rect x="0" y="0" width="300" height="50" rx="25" fill="url(#gold-gradient)"/>
    <text x="150" y="32" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#0a0a0f" text-anchor="middle" font-weight="700">Começar Agora →</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="610" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#71717a" text-anchor="middle" font-weight="500">goldneuron.io</text>
</svg>